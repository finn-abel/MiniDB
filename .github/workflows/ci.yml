name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          gcc --version
          make --version

      - name: Build MiniDB
        run: make

      - name: Clean build output
        run: make clean

      - name: Run test suite
        run: make test
